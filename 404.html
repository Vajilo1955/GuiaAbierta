<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redirigiendo a GuiaAbierta</title>
  </head>
  <body>
    <script>
      const segments = window.location.pathname.split('/').filter(Boolean);
      const repo = segments[0] || '';
      const guiaIndex = segments.indexOf('guia');
      const base = guiaIndex >= 0
        ? '/' + segments.slice(0, guiaIndex + 1).join('/') + '/'
        : repo ? '/' + repo + '/guia/' : '/guia/';
      window.location.replace(base + '?route=' + encodeURIComponent(window.location.pathname));
    </script>
    <a href="./guia/">Abrir GuiaAbierta</a>
  </body>
</html>
